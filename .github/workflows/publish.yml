name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing over OIDC needs npm >= 11.5.1; node 22 ships an older one.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Check package version matches the release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "v$version" != "$TAG" ]; then
            echo "package.json is v$version but the release tag is $TAG" >&2
            exit 1
          fi
      # No token: authentication is via the OIDC trusted publisher configured on npmjs.com.
      - run: npm publish --provenance --access public
